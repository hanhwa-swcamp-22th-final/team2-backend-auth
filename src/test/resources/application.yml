spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

  sql:
    init:
      mode: never

  mail:
    host: localhost
    port: 25

jwt:
  rsa:
    private-key-path: classpath:keys/test-private.pem
    public-key-path: classpath:keys/test-public.pem
  issuer: team2-auth-test
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

server:
  port: 0

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.team2.auth.entity

auth:
  cookie:
    secure: false
    same-site: Strict
