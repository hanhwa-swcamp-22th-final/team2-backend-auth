spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MariaDB
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  sql:
