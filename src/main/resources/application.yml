spring:
  application:
    name: team2-backend-auth

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:h2:mem:team2_auth;MODE=MariaDB}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  h2:
    console:
      enabled: false  # dev profile에서만 true로 오버라이드

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: embedded

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:team2-bucket}

jwt:
  rsa:
    # Use file: prefix for filesystem paths, e.g. file:/run/secrets/private.pem
    # Use classpath: prefix for classpath resources (tests only)
    private-key-path: ${JWT_RSA_PRIVATE_KEY_PATH}
    public-key-path: ${JWT_RSA_PUBLIC_KEY_PATH}
  issuer: ${JWT_ISSUER:team2-auth}
  access-token-expiry: ${JWT_ACCESS_EXPIRY:3600000}
  refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}

server:
  port: 8011

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.team2.auth.command.domain.entity
  type-handlers-package: com.team2.auth.config

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8001}

auth:
  cookie:
    secure: ${AUTH_COOKIE_SECURE:true}
    same-site: ${AUTH_COOKIE_SAME_SITE:Strict}

management:
  endpoints:
    web:
      exposure:
        include: health, info
