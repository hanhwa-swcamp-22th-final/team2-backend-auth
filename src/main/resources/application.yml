spring:
  application:
    name: team2-backend-auth

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/team2_auth}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8011

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.team2.auth.entity

management:
  endpoints:
    web:
      exposure:
        include: health, info
